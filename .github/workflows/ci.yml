name: CI

on:
  pull_request:
    branches: [main, release]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-kotlin:
    name: Detekt + ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: make lint-kotlin

  lint-deno:
    name: Deno lint + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: make lint-deno

  lint-swift:
    name: SwiftLint
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint (portable binary, no Xcode required)
        run: |
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/0.57.1/portable_swiftlint.zip" \
            -o /tmp/swiftlint.zip
          unzip -qo /tmp/swiftlint.zip -d /tmp/swiftlint
          sudo install -m 755 /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint
      - run: make lint-swift

  test-shared:
    name: Shared tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: make test

  build-android:
    name: Android build
    runs-on: ubuntu-latest
    needs: [lint-kotlin, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  build-ios:
    name: iOS framework + app build
    runs-on: [self-hosted, macos]
    needs: [lint-swift, lint-kotlin, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build KMP iOS framework
        run: make build-ios-framework
      - name: Generate Xcode project
        run: make ios-project
      - name: Build iOS app (simulator, no signing)
        run: make ios-build
