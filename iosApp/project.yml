name: Strakk
options:
  bundleIdPrefix: com.strakk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateSchemes: false

configs:
  Debug Production: debug
  Release Production: release
  Debug Staging: debug
  Release Staging: release

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

configFiles:
  Debug Production: Config/Production.xcconfig
  Release Production: Config/Production.xcconfig
  Debug Staging: Config/Staging.xcconfig
  Release Staging: Config/Staging.xcconfig

schemes:
  Strakk:
    build:
      targets:
        Strakk: all
    run:
      config: Debug Production
    test:
      config: Debug Production
    profile:
      config: Release Production
    analyze:
      config: Debug Production
    archive:
      config: Release Production
  Strakk Staging:
    build:
      targets:
        Strakk: all
    run:
      config: Debug Staging
    test:
      config: Debug Staging
    profile:
      config: Release Staging
    analyze:
      config: Debug Staging
    archive:
      config: Release Staging

targets:
  Strakk:
    type: application
    platform: iOS
    sources:
      - iosApp
    info:
      path: iosApp/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: $(STRAKK_DISPLAY_NAME)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - strakk
        NSCameraUsageDescription: "Strakk uses your camera to scan and analyse meal photos with AI."
        NSPhotoLibraryUsageDescription: "Strakk can read photos from your library to analyse meal contents."
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]:
          - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
        FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]:
          - "$(SRCROOT)/../shared/build/bin/iosArm64/debugFramework"
        OTHER_LINKER_FLAGS: "-ObjC"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: VisionKit.framework
    preBuildScripts:
      - name: "Build KMP Shared Framework"
        shell: /bin/bash
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home

          if [[ "$CONFIGURATION" == *Staging* ]]; then
            ENV_FLAG="-Penv=staging"
          else
            ENV_FLAG="-Penv=prod"
          fi

          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 $ENV_FLAG --no-daemon
          else
            ./gradlew :shared:linkDebugFrameworkIosArm64 $ENV_FLAG --no-daemon
          fi
        basedOnDependencyAnalysis: false
