name: Strakk
options:
  bundleIdPrefix: com.strakk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateSchemes: true

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  Strakk:
    type: application
    platform: iOS
    sources:
      - iosApp
    info:
      path: iosApp/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Strakk
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - strakk
        NSCameraUsageDescription: "Strakk uses your camera to scan and analyse meal photos with AI."
        NSPhotoLibraryUsageDescription: "Strakk can read photos from your library to analyse meal contents."
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]:
          - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
        FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]:
          - "$(SRCROOT)/../shared/build/bin/iosArm64/debugFramework"
        OTHER_LINKER_FLAGS: "-ObjC"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: VisionKit.framework
    preBuildScripts:
      - name: "Build KMP Shared Framework"
        shell: /bin/bash
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home

          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon
          else
            ./gradlew :shared:linkDebugFrameworkIosArm64 --no-daemon
          fi
        basedOnDependencyAnalysis: false
