included:
  - iosApp

excluded:
  - build
  - DerivedData
  - "*.xcodeproj"
  - Pods

opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - trailing_comma
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

disabled_rules:
  - trailing_whitespace
  - todo
  - orphaned_doc_comment
  - blanket_disable_command
  - no_grouping_extension

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 10

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - to
    - n
    - s
    - w
    - h

nesting:
  type_level: 2
  function_level: 3

large_tuple:
  warning: 4
  error: 6

reporter: xcode
