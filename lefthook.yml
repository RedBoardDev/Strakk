pre-commit:
  parallel: true
  commands:
    swiftlint:
      glob: "iosApp/**/*.swift"
      run: swiftlint lint --strict --quiet --config iosApp/.swiftlint.yml {staged_files}
    detekt:
      glob: "**/*.kt"
      run: JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home ./gradlew detektAll --daemon --quiet
